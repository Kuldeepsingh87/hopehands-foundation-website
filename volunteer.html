<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HopeHands Foundation | Volunteer</title>
  <meta name="description" content="Register as a volunteer for HopeHands Foundation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="container nav-inner">
      <a class="logo" href="index.html">
        <i class="fa-solid fa-hands-holding-circle"></i>
        <span>HopeHands Foundation</span>
      </a>

      <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
        <i class="fa-solid fa-bars"></i>
      </button>

      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a class="active" href="volunteer.html">Volunteer</a>
        <a href="donate.html">Donate</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container grid-2">
        <div data-animate>
          <div class="section-title" style="text-align:left">
            <h2>Volunteer registration</h2>
            <p>Join our mission and make an impact.</p>
          </div>

          <form class="form" data-validate="true" novalidate>
            <div class="row">
              <div class="field">
                <label for="vname">Name</label>
                <input id="vname" type="text" required />
              </div>

              <div class="field">
                <label for="vemail">Email</label>
                <input id="vemail" type="email" required />
              </div>
            </div>

            <div class="row">
              <div class="field">
                <label for="vphone">Phone</label>
                <input id="vphone" type="tel" required />
              </div>

              <div class="field">
                <label for="vcity">City</label>
                <input id="vcity" type="text" required />
              </div>
            </div>

            <div class="field">
              <label for="vinterest">Interest area</label>
              <select id="vinterest" required>
                <option value="">Select</option>
                <option>Education</option>
                <option>Healthcare</option>
                <option>Child Welfare</option>
                <option>Women Empowerment</option>
                <option>Environment</option>
                <option>Poverty Alleviation</option>
              </select>
            </div>

            <div class="field">
              <label for="vmessage">Message</label>
              <textarea id="vmessage" required></textarea>
            </div>

            <button class="btn btn-primary" type="submit">Register</button>
            <div class="form-msg" aria-live="polite"></div>
          </form>
        </div>

        <div class="card" data-animate>
          <img
            class="page-img"
            src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/ca95931fb9cf2989ff9fd83e7dff99dc7fac3ee1.jpg"
            alt="Volunteers planting trees in the community"
            loading="lazy"
            width="650"
            height="500"
          >
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <p>© 2026 HopeHands Foundation. All rights reserved.</p>
      <div class="socials">
        <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
      </div>
    </div>
  </footer>

  <button class="back-to-top" aria-label="Back to top">
    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <script src="script.js"></script>
</body>
</html>
